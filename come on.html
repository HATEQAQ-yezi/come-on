<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>家庭回忆录</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        family: {
                            light: '#e8f4fd',
                            card: '#ffffff',
                            primary: '#3b82f6',
                            hover: '#2563eb',
                            dark: '#1e3a5f',
                            accent: '#60a5fa',
                            soft: '#dbeafe',
                        }
                    },
                    fontFamily: {
                        display: ['"Noto Serif SC"', '"STSong"', '"SimSun"', 'serif'],
                        body: ['"Noto Sans SC"', '"Microsoft YaHei"', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&family=Noto+Serif+SC:wght@400;600;700&display=swap');

        html { scroll-behavior: smooth; }

        body {
            background: linear-gradient(135deg, #e8f4fd 0%, #dbeafe 30%, #bfdbfe 60%, #e8f4fd 100%);
            min-height: 100vh;
        }

        /* Floating circles decoration */
        .bg-decoration {
            position: fixed;
            border-radius: 50%;
            pointer-events: none;
            z-index: 0;
            opacity: 0.15;
        }

        /* Card hover */
        .family-card {
            background: white;
            border-radius: 20px;
            padding: 40px 32px;
            box-shadow: 0 4px 24px rgba(59, 130, 246, 0.10), 0 1px 4px rgba(30, 58, 95, 0.06);
            transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }
        .family-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, #3b82f6, #60a5fa, #93c5fd);
            transform: scaleX(0);
            transition: transform 0.4s ease;
            border-radius: 0 0 4px 4px;
        }
        .family-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 16px 40px rgba(59, 130, 246, 0.18), 0 4px 12px rgba(30, 58, 95, 0.08);
        }
        .family-card:hover::before {
            transform: scaleX(1);
        }
        .family-card:active {
            transform: translateY(-4px);
        }

        /* Card icon circle */
        .card-icon-circle {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
            margin: 0 auto 20px;
            transition: transform 0.4s ease;
        }
        .family-card:hover .card-icon-circle {
            transform: scale(1.1) rotate(-5deg);
        }

        /* Heartbeat */
        @keyframes heartbeat {
            0%, 100% { transform: scale(1); }
            25% { transform: scale(1.05); }
            50% { transform: scale(1); }
            75% { transform: scale(1.05); }
        }
        .heartbeat {
            animation: heartbeat 2s ease-in-out infinite;
        }

        /* Title glow */
        @keyframes glow {
            0%, 100% { text-shadow: 0 0 20px rgba(59,130,246,0.1); }
            50% { text-shadow: 0 0 40px rgba(59,130,246,0.2); }
        }
        .title-glow {
            animation: glow 4s ease-in-out infinite;
        }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #e8f4fd; }
        ::-webkit-scrollbar-thumb { background: #93c5fd; border-radius: 3px; }

        /* Ripple on click */
        .ripple {
            position: absolute;
            border-radius: 50%;
            background: rgba(59, 130, 246, 0.2);
            transform: scale(0);
            animation: ripple 0.6s ease-out forwards;
            pointer-events: none;
        }
        @keyframes ripple {
            to { transform: scale(4); opacity: 0; }
        }
    </style>
</head>
<body class="font-body text-family-dark min-h-screen flex items-center justify-center relative">

    <!-- Decorative circles -->
    <div class="bg-decoration w-64 h-64 bg-blue-400 -top-20 -left-20"></div>
    <div class="bg-decoration w-96 h-96 bg-blue-500 -bottom-32 -right-32"></div>
    <div class="bg-decoration w-48 h-48 bg-blue-300 top-1/2 left-1/4" style="transform:translate(-50%,-50%)"></div>

    <!-- Main content -->
    <main class="relative z-10 w-full max-w-2xl mx-auto px-6 py-12">
        <!-- Title -->
        <div class="text-center mb-12">
            <div class="text-5xl mb-4 heartbeat inline-block">🏠</div>
            <h1 class="text-4xl md:text-5xl font-display font-bold text-family-dark mb-4 title-glow">
                请点击查看回忆录
            </h1>
            <p class="text-lg md:text-xl text-slate-500 font-light">
                每一张照片，都是我们最温暖的记忆
            </p>
        </div>

        <!-- Two cards -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 md:gap-8">

            <!-- Card 1: 姐姐 -->
            <div class="family-card text-center" onclick="navigate('sister1')">
                <div class="card-icon-circle bg-blue-50">
                    👩
                </div>
                <h2 class="text-2xl md:text-3xl font-display font-bold text-family-dark mb-3">
                    小卢的相册
                </h2>
                <p class="text-base text-slate-400 font-light mb-5 leading-relaxed">
                    记录<br>珍贵时光
                </p>
                <span class="inline-block px-6 py-2.5 bg-blue-500 text-white rounded-full text-base font-medium hover:bg-blue-600 transition-colors duration-300 shadow-md shadow-blue-200">
                    进入相册 📷
                </span>
            </div>

            <!-- Card 2: 妹妹 -->
            <div class="family-card text-center" onclick="navigate('sister2')">
                <div class="card-icon-circle bg-pink-50">
                    👧
                </div>
                <h2 class="text-2xl md:text-3xl font-display font-bold text-family-dark mb-3">
                    小张的相册
                </h2>
                <p class="text-base text-slate-400 font-light mb-5 leading-relaxed">
                    记录<br>快乐时光
                </p>
                <span class="inline-block px-6 py-2.5 bg-pink-400 text-white rounded-full text-base font-medium hover:bg-pink-500 transition-colors duration-300 shadow-md shadow-pink-200">
                    进入相册 🌸
                </span>
            </div>
        </div>

        <!-- Footer hint -->
        <p class="text-center text-slate-300 text-sm mt-10 font-light">
            点击卡片进入对应相册
        </p>
    </main>

    <script>
        function navigate(type) {
            // Ripple effect
            const card = event.currentTarget;
            const ripple = document.createElement('span');
            ripple.className = 'ripple';
            const rect = card.getBoundingClientRect();
            const size = Math.max(rect.width, rect.height);
            ripple.style.width = ripple.style.height = size + 'px';
            ripple.style.left = (event.clientX - rect.left - size / 2) + 'px';
            ripple.style.top = (event.clientY - rect.top - size / 2) + 'px';
            card.appendChild(ripple);
            ripple.addEventListener('animationend', () => ripple.remove());

            // Navigate after brief delay for animation
            setTimeout(() => {
                if (type === 'sister1') {
                    window.location.href = '回忆录-姐姐.html';
                } else if (type === 'sister2') {
                    window.location.href = '回忆录-妹妹.html';
                }
            }, 200);
        }
    </script>
</body>
</html>
